info:
  name: 05_post_shorten_missing_url
  type: http
  seq: 5

http:
  method: POST
  url: https://cloudcut.hermannleboss.workers.dev/api/shorten
  auth: inherit
  headers:
    Content-Type: application/json
  body:
    type: json
    data: |
      {
        "notUrl": "https://example.org"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 400", function() {
          expect(res.status).to.equal(400);
        });

        test("error should mention required url field", function() {
          expect(res.body.error).to.equal("Field 'url' is required");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
