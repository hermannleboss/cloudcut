info:
  name: 07_post_shorten_unsupported_protocol
  type: http
  seq: 7

http:
  method: POST
  url: https://cloudcut.hermannleboss.workers.dev/api/shorten
  auth: inherit
  headers:
    Content-Type: application/json
  body:
    type: json
    data: |
      {
        "url": "ftp://example.org/file.txt"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 400", function() {
          expect(res.status).to.equal(400);
        });

        test("error should mention supported protocols", function() {
          expect(res.body.error).to.equal("Only http and https URLs are supported");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
