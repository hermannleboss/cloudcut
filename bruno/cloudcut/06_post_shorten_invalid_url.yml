info:
  name: 06_post_shorten_invalid_url
  type: http
  seq: 6

http:
  method: POST
  url: https://cloudcut.hermannleboss.workers.dev/api/shorten
  auth: inherit
  headers:
    Content-Type: application/json
  body:
    mode: json
    raw: |
      {
        "url": "not-a-valid-url"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 400", function() {
          expect(res.status).to.equal(400);
        });

        test("error should mention valid URL", function() {
          expect(res.body.error).to.equal("Field 'url' must be a valid URL");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
